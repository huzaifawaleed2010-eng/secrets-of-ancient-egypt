<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاسم الملكي | PharaohGen</title>
    <!-- الوصف: يشرح للمستخدم ماذا سيستفيد من الصفحة -->
    <meta name="description" content="استخدم أداة PharaohGen التفاعلية لكتابة اسمك باللغة المصرية القديمة. تعلم رموز الهيروغليفية وحول حروف اسمك إلى صور ورموز فرعونية أصيلة.">

    <!-- الكلمات المفتاحية: كلمات بحث تقنية وتفاعلية -->
    <meta name="keywords" content="كتابة هيروغليفية, اكتب اسمك بالفراعنة, قاموس هيروغليفي, حروف اللغة المصرية القديمة, رموز فرعونية, تحويل الأسماء">
    <!-- وسوم التواصل الاجتماعي (لأن هذه الصفحة غالباً ما يتم مشاركتها) -->
    <meta property="og:title" content="هل تريد رؤية اسمك بالهيروغليفية؟">
    <meta property="og:description" content="جرب أداة الكتابة بالهيروغليفية الآن واكتشف رموز اسمك الفرعونية.">
    <meta property="og:image" content="images/hieroglyphs-preview.jpg">
    <link rel="stylesheet" href="style-hiero.css">
</head>
<body class="cyber-page">

    <div class="writer-container">
        <h1 class="gold-gradient">المترجم الملكي</h1>
        <p class="subtitle">اكتب اسمك بالإنجليزية لتراه داخل الخرطوش</p>
        
        <input type="text" id="englishInput" placeholder="مثال: HUZAIFA" autocomplete="off" maxlength="15">
        
        <div class="cartouche-wrapper">
            <div id="hieroResult" class="hiero-content">
                <p class="placeholder-text"</p>
            </div>
        </div>

        <div class="back-btn-wrapper">
            <a href="الرئيسية.html" class="cyber-btn">
                <span>العودة للرئيسية</span>
                <i class="fas fa-home"></i> </a>
        </div>
    </div>

    <script src="script-hiero.js"></script>
</body>
</html>
